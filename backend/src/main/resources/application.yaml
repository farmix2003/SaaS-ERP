spring:
  application:
    name: erp_backend

  # ====================== Database Configuration ======================
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_db
    username: postgres
    password: 20030825
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # Recommended when starting fresh

  # ====================== Server Configuration ======================
  server:
    port: 8080

  # ====================== Management Endpoints ======================
  management:
    endpoints:
      web:
        exposure:
          include: health,info

# Optional: Logging level for better debugging
logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE