spring:
  application:
    name: erp_backend

  # ====================== Database Configuration ======================
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_db
    username: postgres
    password: 20030825
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ====================== Server Configuration ======================
server:  # ✅ CORRECT - Top level
  port: 8080

# ====================== Management Endpoints ======================
management:  # ✅ CORRECT - Top level
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ====================== Application Info ======================
info:  # ✅ CORRECT - Top level
  app:
    name: ERP Backend
    description: Multi-tenant SaaS ERP backend

# ====================== Logging ======================
logging:  # ✅ CORRECT - Top level
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ====================== JWT ======================
jwt:  # ✅ CORRECT - Top level (custom property)
  secret: ${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  access-token-expiration-ms: 900000