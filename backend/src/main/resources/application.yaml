spring:
  application:
    name: erp_backend

datasource:
   url: jdbc:postgresql://localhost:5432/erp_db
   username: postgresql
   password: 20030825
   driver-class-name: org.postgresql.Driver

   jpa:
     hibernate:
       ddl-auto: validate
     show-sql: true
     properties:
       hibernate:
         format_sql: true

   flyway:
     enabled: true
     locations: classpath:db/migration

   server:
     port: 8080

   management:
     endpoints:
       web:
         exposure:
           include: health,info

